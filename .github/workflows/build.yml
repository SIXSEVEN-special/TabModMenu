name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            shell: pwsh
            sdk_path: "~/.geode/sdk"
          - name: macOS
            os: macos-latest
            shell: bash
            sdk_path: "~/Library/Application Support/Geode/sdk"

    name: '${{ matrix.config.name }}'
    runs-on: '${{ matrix.config.os }}'

    steps:
      - uses: actions/checkout@v4

      # Installs Geode tools cleanly on both operating systems
      - name: Setup Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main

      # Feeds the correct path variable straight into CMake without inline scripts
      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_PREFIX_PATH="${{ matrix.config.sdk_path }}"
        shell: '${{ matrix.config.shell }}'

      - name: Build Mod Binaries
        run: |
          cmake --build build --config Release
        shell: '${{ matrix.config.shell }}'
