name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Geode CLI
        run: |
          bgexec iwr -Uri "https://github.com/geode-sdk/cli/releases/latest/download/geode-cli-win.zip" -OutFile "geode-cli.zip"
          Expand-Archive -Path "geode-cli.zip" -DestinationPath "${env:USERPROFILE}\.geode\bin" -Force
          echo "${env:USERPROFILE}\.geode\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install Geode SDK Binaries
        run: |
          geode sdk install
        shell: pwsh

      - name: Configure CMake
        run: |
          # Manually exposing the installation path directly to CMake prevents the module path error
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="${env:USERPROFILE}\.geode\sdk"
        shell: pwsh

      - name: Build Mod Binaries
        run: |
          cmake --build build --config Release
        shell: pwsh
